<h2>Course List</h2>

<p *ngIf="isLoading">Loading courses...</p>

<ng-container *ngIf="!isLoading">
  <ng-container *ngIf="courses.length > 0; else noCourses">
    <app-course-card
      *ngFor="let course of courses; let i = index; trackBy: trackByCourseId"
      [course]="course"
      (enrollRequested)="onEnroll($event)">
    </app-course-card>
  </ng-container>

  <ng-template #noCourses>
    <p>No courses available.</p>
  </ng-template>
</ng-container>

<p *ngIf="selectedCourseId">Selected course ID: {{ selectedCourseId }}</p>
